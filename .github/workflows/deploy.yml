name: Deploy to InfinityFree via FTP

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Build Frontend (outputs to backend/public/build/)
      - name: Build Frontend
        working-directory: ./frontend
        env:
          VITE_API_BASE_URL: https://rosastore.xo.je/api
        run: |
          npm install
          npm run build

      # Setup PHP for Composer
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl

      # Install Backend Dependencies
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: composer install --no-dev --optimize-autoloader

      # Prepare Deployment Directory (SIMPLE - no flattening)
      - name: Prepare Deployment Directory
        run: |
          mkdir -p htdocs

          # 1. Copy entire backend to htdocs (keeps standard Laravel structure)
          cp -r backend/* htdocs/
          rm -rf htdocs/node_modules htdocs/.env

          # 2. Copy root .htaccess (routes everything through public/)
          cp htaccess-root htdocs/.htaccess

          # 3. Patch manifest key to match blade @vite call
          MANIFEST=""
          if [ -f "htdocs/public/build/.vite/manifest.json" ]; then
            MANIFEST="htdocs/public/build/.vite/manifest.json"
          elif [ -f "htdocs/public/build/manifest.json" ]; then
            MANIFEST="htdocs/public/build/manifest.json"
          fi

          if [ -n "$MANIFEST" ]; then
            MANIFEST_KEY=$(python3 -c "import sys,json; d=json.load(open('$MANIFEST')); print(list(d.keys())[0])")
            echo "Found manifest key: $MANIFEST_KEY"
            if [ "$MANIFEST_KEY" != "src/main.jsx" ]; then
              sed -i "s|\"$MANIFEST_KEY\"|\"src/main.jsx\"|g" "$MANIFEST"
              echo "Patched manifest key to: src/main.jsx"
            fi
          fi

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./htdocs/
          server-dir: /htdocs/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
