name: Deploy to InfinityFree via FTP

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Build Frontend
      - name: Build Frontend
        working-directory: ./frontend
        env:
          VITE_API_BASE_URL: https://rosastore.xo.je/api
        run: |
          npm install
          npm run build

      # Setup PHP for Composer
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl

      # Install Backend Dependencies
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: composer install --no-dev --optimize-autoloader

      # Prepare for Deployment (Integrated Layout)
      - name: Prepare Deployment Directory
        run: |
          mkdir -p htdocs
          
          # 1. Prepare Backend structure
          mkdir -p temp_backend
          cp -r backend/* temp_backend/
          rm -rf temp_backend/node_modules temp_backend/.env
          
          # 2. Add Built Frontend to Backend Public
          mkdir -p temp_backend/public/build
          cp -r frontend/dist/* temp_backend/public/build/
          
          # 3. Move EVERYTHING into htdocs for root serving
          # (Shared hosting standard where htdocs is the root)
          cp -r temp_backend/* htdocs/
          
          # 4. Move public contents to htdocs root
          cp -r temp_backend/public/* htdocs/
          rm -rf htdocs/public
          
          # 5. Adjust index.php for same-folder vendor/bootstrap (since everything is in root)
          sed -i "s|require __DIR__.'/../vendor/autoload.php'|require __DIR__.'/vendor/autoload.php'|g" htdocs/index.php
          sed -i "s|require_once __DIR__.'/../bootstrap/app.php'|require_once __DIR__.'/bootstrap/app.php'|g" htdocs/index.php
          sed -i "s|__DIR__.'/../storage/framework/maintenance.php'|__DIR__.'/storage/framework/maintenance.php'|g" htdocs/index.php

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./htdocs/
          server-dir: /htdocs/
